name: ML Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python train.py
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db

      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

      - name: Upload MLflow database
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-db
          path: mlflow.db

  deploy:
    name: Deploy Model
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download model info
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Download MLflow database
        uses: actions/download-artifact@v4
        with:
          name: mlflow-db

      - name: Check accuracy threshold
        run: python check_threshold.py
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db

      - name: Mock Docker Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
